name: Sign Artifacts

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [master]

jobs:
  sign-windows:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'refs/tags/') == false &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    strategy:
      matrix:
        artifact:
          - name: win-vengi-msi
            file: vengi.msi
            signing-config: msi
          - name: win-voxedit
            signing-config: pe
          - name: win-voxconvert
            signing-config: pe
          - name: win-palconvert
            signing-config: pe
          - name: win-thumbnailer
            signing-config: pe
    steps:
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact.name }}
          path: unsigned
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack artifact for signing (ZIP)
        if: matrix.artifact.signing-config == 'pe'
        run: |
          cd unsigned
          zip -r ../to-sign.zip .

      - name: Pack artifact for signing (MSI)
        if: matrix.artifact.signing-config == 'msi'
        run: cp unsigned/${{ matrix.artifact.file }} to-sign.msi

      - name: Upload artifact for SignPath
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact.name }}-unsigned
          path: ${{ matrix.artifact.signing-config == 'pe' && 'to-sign.zip' || 'to-sign.msi' }}

      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'vengi'
          signing-policy-slug: 'test-signing'
          artifact-configuration-slug: '${{ matrix.artifact.signing-config }}'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Upload signed artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact.name }}-signed
          path: signed/

  sign-windows-release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
    strategy:
      matrix:
        artifact:
          - name: win-vengi-msi
            file: vengi.msi
            signing-config: msi
            release-name: vengi.msi
          - name: win-voxedit
            signing-config: pe
            release-name: win-voxedit.zip
          - name: win-voxconvert
            signing-config: pe
            release-name: win-voxconvert.zip
          - name: win-palconvert
            signing-config: pe
            release-name: win-palconvert.zip
          - name: win-thumbnailer
            signing-config: pe
            release-name: win-thumbnailer.zip
    steps:
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact.name }}
          path: unsigned
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack artifact for signing (ZIP)
        if: matrix.artifact.signing-config == 'pe'
        run: |
          cd unsigned
          zip -r ../to-sign.zip .

      - name: Pack artifact for signing (MSI)
        if: matrix.artifact.signing-config == 'msi'
        run: cp unsigned/${{ matrix.artifact.file }} to-sign.msi

      - name: Upload artifact for SignPath
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact.name }}-release-unsigned
          path: ${{ matrix.artifact.signing-config == 'pe' && 'to-sign.zip' || 'to-sign.msi' }}

      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'vengi'
          signing-policy-slug: 'test-signing'
          artifact-configuration-slug: '${{ matrix.artifact.signing-config }}'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Prepare release file (ZIP)
        if: matrix.artifact.signing-config == 'pe'
        run: cp signed/to-sign.zip ${{ matrix.artifact.release-name }}

      - name: Prepare release file (MSI)
        if: matrix.artifact.signing-config == 'msi'
        run: cp signed/to-sign.msi ${{ matrix.artifact.release-name }}

      - name: Upload signed artifact to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: ${{ matrix.artifact.release-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
